<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Poseidon - Krok 4 (Vysílače) - Responzivní</title>
    <style>
        :root { --enika-blue: #0055a5; --enika-orange: #e67e22; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; background: #1a1a1a; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }

        /* --- HLAVNÍ KONTEJNER (Poměr 16:9) --- */
        .scene-container {
            position: relative;
            aspect-ratio: 16 / 9;
            height: 100vh;
            max-width: 100vw;
            background: url('PA_1.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* --- PŘIJÍMAČE (Vlevo v projektu) --- */
        .device-placed {
            position: absolute;
            width: 8%; min-width: 110px; padding: 10px;
            background: #e8f4ff; border: 1px solid var(--enika-blue);
            border-radius: 5px; z-index: 500; font-size: 11px; opacity: 0.9;
        }
        .device-placed b { color: var(--enika-blue); }

        /* --- NOVÝ VYSÍLAČ ŠTÍTEK --- */
        .detected-area-label {
            position: absolute;
            top: 31%; left: 30%;
            color: white; font-size: 11px; font-weight: bold; text-transform: uppercase;
            z-index: 1050; background: var(--enika-orange); 
            padding: 2px 8px; border-radius: 3px;
        }

        /* --- SPOTLIGHT & BUBLINA --- */
        .anchor-point {
            position: absolute;
            top: 30%; left: 29%; width: 20%; height: 30%;
            z-index: 1000;
        }

        .spotlight {
            position: absolute; width: 100%; height: 100%;
            border: 2px dashed white;
            box-shadow: 0 0 20px white, 0 0 0 5000px rgba(0,0,0,0.7);
            border-radius: 5px; pointer-events: none;
        }

        .guide-bubble {
            position: absolute;
            top: 0; left: 110%; 
            background: white; padding: 20px; border-radius: 10px;
            width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 8px solid var(--enika-orange);
        }

        /* --- VYSÍLAČ (DRAG & DROP) --- */
        .device-new {
            position: absolute;
            width: 8%; min-width: 120px; padding: 10px;
            background: #fffdf0; border: 1px solid var(--enika-orange);
            border-radius: 5px; cursor: move;
            z-index: 1100; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: 11px;
        }
        .device-new b { color: var(--enika-orange); }

        .top-menu-btn { 
            position: absolute; top: 5px; right: 20px; z-index: 10000; 
            background: #f0f0f0; border: 1px solid #ccc; padding: 2px 12px; 
            font-size: 12px; cursor: pointer; border-radius: 3px; font-weight: bold; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="scene-container" id="main-scene">
        <button class="top-menu-btn" onclick="window.location.href='index.html'">⚙️ Volba profilu</button>

        <div class="device-placed" style="top: 20%; left: 2%;">
            <b>P8 R 2 DIN</b><br>ID: 4A55
        </div>
        <div class="device-placed" style="top: 30%; left: 2%;">
            <b>P8 R 1 ON/OFF</b><br>ID: 12BC
        </div>

        <div id="detected-label" class="detected-area-label">Vyhledané vysílače</div>

        <div id="step-4-container" class="anchor-point">
            <div class="spotlight"></div>
            <div class="guide-bubble">
                <h3 style="margin-top:0; color: var(--enika-orange); font-size: 16px;">Krok 4: Přidání vysílačů</h3>
                <p style="font-size: 13px;">Přijímače už máte v projektu (vlevo).</p>
                <p style="font-size: 13px;">Nyní k nim <b>přesuňte</b> tento nový vysílač.</p>
            </div>
        </div>

        <div id="trans1" class="device-new" style="top: 35%; left: 30%;" onmousedown="dragElement(this)">
            <b>P8 T 4 multi</b><br>ID: 88F1<br><small>Tlačítkový vysílač</small>
        </div>
    </div>

    <script>
        function dragElement(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                
                document.getElementById('step-4-container').classList.add('hidden');
                document.getElementById('detected-label').classList.add('hidden');
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;

                // Kontrola, zda byl vysílač přetažen do levé části projektu
                const sceneWidth = document.getElementById('main-scene').offsetWidth;
                const currentLeft = elmnt.offsetLeft;

                if (currentLeft < (sceneWidth * 0.25)) {
                    setTimeout(() => {
                        if (confirm("Zařízení jsou připravena. Chcete nyní vytvořit vazby?")) {
                            window.location.href = "index5.html"; 
                        }
                    }, 300);
                }
            }
        }
    </script>
</body>
</html>
