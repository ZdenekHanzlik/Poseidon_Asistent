<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Poseidon - Krok 4 (Vysílače)</title>
    <style>
        :root { --enika-blue: #0055a5; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #1a1a1a; }

        .app-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('PA_1.jpg') no-repeat center center;
            background-size: contain; z-index: 1;
        }

        .top-menu-btn { 
            position: fixed; top: 5px; right: 150px; z-index: 10000; 
            background: #f0f0f0; border: 1px solid #ccc; padding: 2px 12px; 
            font-size: 12px; cursor: pointer; border-radius: 3px; font-weight: bold; 
        }

        /* --- PŘIJÍMAČE (již umístěné vlevo) --- */
        .device-placed {
            position: absolute;
            width: 130px; padding: 10px;
            background: #e8f4ff; /* Světle modrá - jsou už v projektu */
            border: 1px solid var(--enika-blue);
            border-radius: 5px; z-index: 500;
            font-size: 12px; opacity: 0.8;
        }
        .device-placed b { color: var(--enika-blue); }

        /* --- NOVÝ VYSÍLAČ --- */
        .detected-area-label {
            position: absolute;
            top: 210px; left: 500px;
            color: white; font-size: 11px; font-weight: bold; text-transform: uppercase;
            z-index: 1050; background: #e67e22; 
            padding: 2px 8px; border-radius: 3px;
        }

        .anchor-point {
            position: absolute;
            top: 210px; left: 500px; width: 200px; height: 150px;
            z-index: 1000;
        }

        .spotlight {
            position: absolute; width: 100%; height: 100%;
            border: 2px dashed white;
            box-shadow: 0 0 20px white, 0 0 0 5000px rgba(0,0,0,0.7);
            border-radius: 5px; pointer-events: none;
        }

        .guide-bubble {
            position: absolute;
            top: 0; left: 220px; 
            background: white; padding: 20px; border-radius: 10px;
            width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 8px solid #e67e22;
        }

        .device-new {
            position: absolute;
            width: 140px; padding: 10px;
            background: #fffdf0; border: 1px solid #d35400;
            border-radius: 5px; cursor: move;
            z-index: 1100; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: 12px;
        }
        .device-new b { color: #d35400; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <button class="top-menu-btn" onclick="window.location.href='index.html'">⚙️ Volba profilu</button>
    <div class="app-bg"></div>

    <div class="device-placed" style="top: 150px; left: 120px;">
        <b>P8 R 2 DIN</b><br>ID: 4A55
    </div>
    <div class="device-placed" style="top: 210px; left: 120px;">
        <b>P8 R 1 ON/OFF</b><br>ID: 12BC
    </div>

    <div id="detected-label" class="detected-area-label">Vyhledané vysílače</div>

    <div id="step-4-container" class="anchor-point">
        <div class="spotlight"></div>
        <div class="guide-bubble">
            <h3 style="margin-top:0; color: #d35400; font-size: 16px;">Krok 4: Přidání vysílačů</h3>
            <p style="font-size: 13px;">Přijímače už máte v projektu (vlevo).</p>
            <p style="font-size: 13px;">Nyní k nim <b>přesuňte</b> tento nový vysílač.</p>
        </div>
    </div>

    <div id="trans1" class="device-new" style="top: 230px; left: 520px;" onmousedown="dragElement(this)">
        <b>P8 T 4 multi</b><br>ID: 88F1<br><small>Tlačítkový vysílač</small>
    </div>

    <script>
        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                
                document.getElementById('step-3-container')?.classList.add('hidden'); // Fix pro případné staré ID
                document.getElementById('step-4-container').classList.add('hidden');
                document.getElementById('detected-label').classList.add('hidden');
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;

                if (parseInt(elmnt.style.left) < 450) {
                    setTimeout(() => {
                        if (confirm("Zařízení jsou připravena. Chcete nyní vytvořit vazby?")) {
                            window.location.href = "index5.html"; 
                        }
                    }, 500);
                }
            }
        }
    </script>
</body>
</html>
