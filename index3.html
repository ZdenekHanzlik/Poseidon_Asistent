<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Poseidon - Krok 4 (Responzivní)</title>
    <style>
        :root { --enika-blue: #0055a5; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; background: #1a1a1a; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }

        /* --- HLAVNÍ KONTEJNER (Fixní poměr 16:9) --- */
        .scene-container {
            position: relative;
            aspect-ratio: 16 / 9;
            height: 100vh;
            max-width: 100vw;
            background: url('PA_1.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* --- UKOTVENÍ PRO TLAČÍTKO "POSLOUCHAT" --- */
        .anchor-point {
            position: absolute;
            /* Procentuální pozice pro tlačítko Poslouchat */
            top: 17%; 
            left: 18%; 
            width: 6.5%; 
            height: 4.5%;
            z-index: 1000;
        }

        .click-trigger {
            position: absolute;
            width: 100%; height: 100%;
            cursor: pointer;
            z-index: 10;
            background: rgba(0, 255, 0, 0); /* Pro ladění změň na 0.3 */
        }

        .spotlight {
            position: absolute;
            width: 100%; height: 100%;
            border: 3px solid white;
            box-shadow: 0 0 20px white, 0 0 0 5000px rgba(0,0,0,0.7);
            border-radius: 5px;
            pointer-events: none;
        }

        .guide-bubble {
            position: absolute;
            top: 120%; 
            left: 0;
            background: white; padding: 20px; border-radius: 10px;
            width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 8px solid var(--enika-blue);
        }

        /* --- MODÁLNÍ OKNO --- */
        #search-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #f0f0f0; border: 1px solid #777; width: 90%; max-width: 420px; z-index: 2000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: none;
        }
        .win-header { background: white; padding: 6px 10px; font-weight: bold; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; }
        .win-body { padding: 30px; text-align: center; }

        .top-menu-btn { 
            position: absolute; top: 5px; right: 20px; z-index: 100; 
            background: #f0f0f0; border: 1px solid #ccc; padding: 2px 12px; 
            font-size: 12px; cursor: pointer; border-radius: 3px; font-weight: bold; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="scene-container">
        <button class="top-menu-btn" onclick="goToStart()">⚙️ Volba profilu</button>

        <div id="step-4-container" class="anchor-point">
            <div class="click-trigger" onclick="startSearching()"></div>
            <div class="spotlight"></div>
            <div class="guide-bubble">
                <h3 style="margin-top:0; color: var(--enika-blue); font-size: 16px;">Krok 4: Bateriová zařízení</h3>
                <p style="font-size: 13px;">Klikněte na tlačítko <b>Poslouchat</b>.</p>
                <p style="font-size: 13px;">Poté na ovladači stiskněte jakékoliv tlačítko 2x krátce po sobě (Cvak-cvak).</p>
            </div>
        </div>
    </div>

    <div id="search-window">
        <div class="win-header"><span>Vyhledávání...</span><span style="cursor:pointer" onclick="closeWindow()">✕</span></div>
        <div class="win-body">
            <p>Hledám bateriová zařízení...</p>
            <div id="loader" style="margin: 20px; font-size: 24px;">⏳</div>
            <div id="result-text" style="font-weight: bold; color: var(--enika-blue);"></div>
        </div>
    </div>

    <script>
        function startSearching() {
            document.getElementById('step-4-container').classList.add('hidden');
            document.getElementById('search-window').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result-text').innerHTML = "Nalezena 2 zařízení!";
                
                setTimeout(() => {
                    window.location.href = "index4.html";
                }, 1500); 
            }, 2000);
        }

        function closeWindow() {
            document.getElementById('search-window').style.display = 'none';
            document.getElementById('step-4-container').classList.remove('hidden');
        }

        function goToStart() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
