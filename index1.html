<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Poseidon - Krok 2 (Responzivní)</title>
    <style>
        :root { --enika-blue: #0055a5; }
        
        /* Základní nastavení plochy */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a1a1a; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- HLAVNÍ KONTEJNER (Drží poměr stran obrázku) --- */
        .scene-container {
            position: relative;
            aspect-ratio: 16 / 9;
            height: 100vh;
            max-width: 100vw;
            background: url('PA_1.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* --- SPOLEČNÝ KONTEJNER PRO POZICI (Anchor) --- */
        .anchor-point {
            position: absolute;
            /* Procentuální pozice tlačítka "Vyhledat" na ploše */
            top: 22%; 
            left: 30%; 
            width: 5%; 
            height: 4%;
            z-index: 1000;
        }

        /* Průhledná zóna pro klik */
        .click-trigger {
            position: absolute;
            width: 100%; height: 100%;
            cursor: pointer;
            z-index: 10;
            background: rgba(0, 255, 0, 0); /* Pro testování pozice změň 0 na 0.3 */
        }

        /* Spotlight */
        .spotlight {
            position: absolute;
            width: 100%; height: 100%;
            border: 3px solid white;
            box-shadow: 0 0 20px white, 0 0 0 5000px rgba(0,0,0,0.7);
            border-radius: 5px;
            pointer-events: none;
        }

        /* Bublina s nápovědou */
        .guide-bubble {
            position: absolute;
            top: 120%; /* Skočí pod spotlight */
            left: 0;
            background: white; 
            padding: 20px; 
            border-radius: 10px;
            width: 280px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 8px solid var(--enika-blue);
        }

        /* --- SYSTÉMOVÁ OKNA --- */
        #search-window {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #f0f0f0; border: 1px solid #777; width: 90%; max-width: 420px; z-index: 2000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: none;
        }
        .win-header { background: white; padding: 6px 10px; font-weight: bold; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; }
        .win-body { padding: 30px; text-align: center; }

        .top-menu-btn { 
            position: absolute; 
            top: 5px; 
            right: 20px; 
            z-index: 100; 
            background: #f0f0f0; 
            border: 1px solid #ccc; 
            padding: 2px 12px; 
            font-size: 12px; 
            cursor: pointer; 
            border-radius: 3px; 
            font-weight: bold; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="scene-container">
        <button class="top-menu-btn" onclick="goToStart()">⚙️ Volba profilu</button>

        <div id="detected-label1" class="detected-area-label1">Zařízení v projektu</div>

        <div id="step-2-container" class="anchor-point">
            <div class="click-trigger" onclick="startSearching()"></div>
            <div class="spotlight"></div>
            <div class="guide-bubble">
                <h3 style="margin-top:0; color: var(--enika-blue); font-size: 16px;">Krok 2: Vyhledání napájených zařízení</h3>
                <p style="font-size: 13px;">Odpojte a připojte zařízení od napájení. Přístroje jsou viditelné 5 minut po nahození napájení.</p>
                <p style="font-size: 13px;">Poté klikněte na tlačítko <b>Vyhledat</b>.</p>
            </div>
        </div>
    </div>

    <div id="search-window">
        <div class="win-header"><span>Vyhledávání...</span><span style="cursor:pointer" onclick="closeWindow()">✕</span></div>
        <div class="win-body">
            <p>Hledám zařízení v radiovém dosahu...</p>
            <div id="loader" style="margin: 20px; font-size: 24px;">⏳</div>
            <div id="result-text" style="font-weight: bold; color: var(--enika-blue);"></div>
        </div>
    </div>

    <script>
        function startSearching() {
            document.getElementById('step-2-container').classList.add('hidden');
            document.getElementById('search-window').style.display = 'block';
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('result-text').innerHTML = "Nalezena 2 zařízení!";
                
                setTimeout(() => {
                    window.location.href = "index2.html";
                }, 1500); 
            }, 2000);
        }

        function closeWindow() {
            document.getElementById('search-window').style.display = 'none';
            document.getElementById('step-2-container').classList.remove('hidden');
        }

        function goToStart() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
