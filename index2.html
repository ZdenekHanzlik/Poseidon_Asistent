<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Poseidon - Krok 3 (Responzivní)</title>
    <style>
        :root { --enika-blue: #0055a5; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Segoe UI', sans-serif; background: #1a1a1a; 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }

        /* --- HLAVNÍ KONTEJNER (Poměr 16:9) --- */
        .scene-container {
            position: relative;
            aspect-ratio: 16 / 9;
            height: 100vh;
            max-width: 100vw;
            background: url('PA_1.jpg') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* --- ŠTÍTEK NAD SEZNAMEM --- */
        .detected-area-label {
            position: absolute;
            top: 31%; left: 29%; /* Pozice v rámci obrázku */
            color: white; font-size: 11px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            z-index: 1050; background: var(--enika-blue);
            padding: 2px 8px; border-radius: 3px;
            pointer-events: none;
        }

        /* --- SPOTLIGHT & BUBLINA --- */
        .anchor-point {
            position: absolute;
            top: 30%; left: 28%; width: 20%; height: 30%;
            z-index: 1000;
        }

        .spotlight {
            position: absolute; width: 100%; height: 100%;
            border: 2px dashed white;
            box-shadow: 0 0 20px white, 0 0 0 5000px rgba(0,0,0,0.7);
            border-radius: 5px; pointer-events: none;
        }

        .guide-bubble {
            position: absolute;
            top: 0; left: 110%; /* Bublina vpravo od spotlightu */
            background: white; padding: 20px; border-radius: 10px;
            width: 250px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 8px solid var(--enika-blue);
        }

        /* --- ZAŘÍZENÍ (DRAG & DROP) --- */
        .device {
            position: absolute;
            width: 8%; /* Šířka relativní k ploše */
            min-width: 110px;
            padding: 10px;
            background: white; border: 1px solid #777;
            border-radius: 5px; cursor: move;
            z-index: 1100; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: 11px;
        }
        .device b { color: var(--enika-blue); }

        .top-menu-btn { 
            position: absolute; top: 5px; right: 20px; z-index: 10000; 
            background: #f0f0f0; border: 1px solid #ccc; padding: 2px 12px; 
            font-size: 12px; cursor: pointer; border-radius: 3px; font-weight: bold; 
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="scene-container" id="main-scene">
        <button class="top-menu-btn" onclick="window.location.href='index.html'">⚙️ Volba profilu</button>
        
        <div id="detected-label" class="detected-area-label">Vyhledaná zařízení</div>

        <div id="step-3-container" class="anchor-point">
            <div class="spotlight"></div>
            <div class="guide-bubble">
                <h3 style="margin-top:0; color: var(--enika-blue); font-size: 16px;">Krok 3: Vložení do projektu</h3>
                <p style="font-size: 13px;">Zařízení se objevila v seznamu vpravo.</p>
                <p style="font-size: 13px;"><b>Přesuňte</b> je myší do levého bílého okna projektu.</p>
            </div>
        </div>

        <div id="dev1" class="device" style="top: 35%; left: 29%;" onmousedown="dragElement(this)">
            <b>P8 R 2 DIN</b><br>ID: 4A55
        </div>

        <div id="dev2" class="device" style="top: 45%; left: 29%;" onmousedown="dragElement(this)">
            <b>P8 R 1 ON/OFF</b><br>ID: 12BC
        </div>
    </div>

    <script>
        let movedDevices = 0;
        const totalDevices = 2;

        function dragElement(elmnt) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                
                document.getElementById('step-3-container').classList.add('hidden');
                document.getElementById('detected-label').classList.add('hidden');
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                // Pohyb v pixelech funguje dobře, protože počítáme relativně k aktuální poloze
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;

                // Logika vložení: zkontrolujeme, zda je prvek v levé části scény
                // Scéna má 100 % šířky, levé okno v Poseidonu končí cca ve 25 % šířky
                const sceneWidth = document.getElementById('main-scene').offsetWidth;
                const currentLeft = elmnt.offsetLeft;

                if (currentLeft < (sceneWidth * 0.25) && !elmnt.classList.contains('placed')) {
                    elmnt.classList.add('placed');
                    movedDevices++;
                    
                    if (movedDevices === totalDevices) {
                        setTimeout(() => {
                            alert("Všechny přijímače vloženy. Nyní vyhledáme vysílače.");
                            window.location.href = "index3.html"; 
                        }, 500);
                    }
                }
            }
        }
    </script>
</body>
</html>
